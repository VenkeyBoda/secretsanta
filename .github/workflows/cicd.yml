name: Docker Image Build and Push

on:
    push:
      branches:
        - feature_develop
        - main
  
    pull_request:
      branches:
        - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker image
        run: docker build -t $DOCKER_USERNAME/santa:latest .

      - name: Push Docker image
        run: docker push $DOCKER_USERNAME/santa:latest

      - name: Install Trivy
        run: |
            wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.69.3_Linux-64bit.deb
            sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Trivy scan
        run: trivy image $DOCKER_USERNAME/santa:latest